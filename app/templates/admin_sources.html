<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSS 源配置</title>
  <style>
    body{font-family:system-ui,-apple-system,'PingFang SC',sans-serif;background:#f6f8fb;color:#111;margin:0;padding:24px}
    main{max-width:1120px;margin:0 auto}
    h1{margin:0 0 6px}
    .muted{color:#667085;font-size:13px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 16px}
    button{border:1px solid #d0d5dd;background:#fff;border-radius:10px;padding:8px 12px;cursor:pointer}
    button.primary{background:#0b73ff;color:#fff;border-color:#0b73ff}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e4e7ec;border-radius:12px;overflow:hidden}
    th,td{border-bottom:1px solid #eef1f5;padding:10px;vertical-align:top}
    th{text-align:left;background:#fafbfc;font-size:13px;color:#475467}
    tr:last-child td{border-bottom:none}
    input,textarea{width:100%;box-sizing:border-box;border:1px solid #d0d5dd;border-radius:8px;padding:8px;font:inherit}
    textarea{min-height:60px;resize:vertical}
    .row-actions{display:flex;gap:8px}
    .status{margin-top:12px;font-size:14px}
    .ok{color:#067647}.err{color:#b42318}
    a{color:#0b73ff;text-decoration:none}
  </style>
</head>
<body>
<main>
  <h1>RSS 源配置</h1>
  <div class="muted">配置文件：{{ sources_file }}</div>
  <div class="actions">
    <a href="/">← 返回首页</a>
    <button id="addBtn">+ 新增一行</button>
    <button id="saveBtn" class="primary">保存配置</button>
  </div>

  <table id="sourcesTable">
    <thead>
      <tr>
        <th style="width:20%">名称</th>
        <th style="width:35%">RSS URL</th>
        <th style="width:12%">分类</th>
        <th style="width:25%">备注</th>
        <th style="width:8%">操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="status" class="status"></div>
</main>

<script>
const initialSources = {{ sources | tojson }};
const tbody = document.getElementById('tbody');
const statusEl = document.getElementById('status');

function rowHtml(item = {name:'', url:'', category:'custom', notes:''}) {
  return `
    <tr>
      <td><input data-key="name" value="${escapeHtml(item.name || '')}" placeholder="例如：36氪" /></td>
      <td><input data-key="url" value="${escapeHtml(item.url || '')}" placeholder="https://example.com/feed" /></td>
      <td><input data-key="category" value="${escapeHtml(item.category || 'custom')}" placeholder="china/global/custom" /></td>
      <td><textarea data-key="notes" placeholder="可选">${escapeHtml(item.notes || '')}</textarea></td>
      <td>
        <div class="row-actions">
          <button type="button" onclick="removeRow(this)">删除</button>
        </div>
      </td>
    </tr>
  `;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function renderRows(rows) {
  tbody.innerHTML = rows.map(rowHtml).join('');
}

function removeRow(btn) {
  btn.closest('tr').remove();
}
window.removeRow = removeRow;

function collectRows() {
  const rows = [];
  for (const tr of tbody.querySelectorAll('tr')) {
    const item = {};
    for (const field of tr.querySelectorAll('[data-key]')) {
      item[field.dataset.key] = field.value.trim();
    }
    if (!item.name && !item.url) continue;
    rows.push(item);
  }
  return rows;
}

function setStatus(msg, ok=false) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (ok ? 'ok' : 'err');
}

document.getElementById('addBtn').addEventListener('click', () => {
  tbody.insertAdjacentHTML('beforeend', rowHtml());
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const sources = collectRows();
  try {
    const apiBase = window.location.pathname.includes('/rss/') ? '/rss/api/sources' : '/api/sources';
    const resp = await fetch(apiBase, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sources})
    });
    const data = await resp.json();
    if (!resp.ok) {
      throw new Error(data.detail || '保存失败');
    }
    setStatus(`保存成功，共 ${data.count} 个 RSS 源。`, true);
  } catch (e) {
    setStatus(`保存失败：${e.message || e}`);
  }
});

renderRows(initialSources);
if (!initialSources.length) {
  tbody.insertAdjacentHTML('beforeend', rowHtml());
}
</script>
</body>
</html>
