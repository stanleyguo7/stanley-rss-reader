<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSS 情报摘要</title>
  <style>
    body { font-family: 'Noto Sans SC','PingFang SC',system-ui,sans-serif; margin: 0; background: #f5f5f5; color: #111; }
    main { max-width: 980px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0; }
    .sub { color: #666; margin-top: 8px; }
    .top { display: flex; justify-content: space-between; gap: 12px; align-items: end; flex-wrap: wrap; }
    .top a { color: #0b73ff; text-decoration: none; font-weight: 600; }
    section { background: #fff; border: 1px solid #e9e9e9; border-radius: 14px; padding: 16px; margin-top: 16px; }
    .meta { color: #666; font-size: 13px; margin-top: 6px; }
    .item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .item:last-child { border-bottom: none; }
    .item h3 { margin: 0 0 6px; font-size: 18px; }
    .time { color: #8a8a8a; font-size: 13px; margin-bottom: 8px; }
    .summary { color: #333; line-height: 1.6; margin: 0 0 8px; }
    .item a { color: #0b73ff; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>RSS 情报摘要</h1>
        <div class="sub">更新时间：{{ generated }} · 共 {{ total }} 条</div>
      </div>
      <a href="/feed.xml" target="_blank">订阅 RSS</a>
    </div>

    {% for feed in feeds %}
    <section>
      <h2>{{ feed.source_name }}</h2>
      <div class="meta">{{ feed.notes }} · {{ feed.count }} 条</div>
      {% for e in feed.entries %}
      <article class="item">
        <h3>{{ e.title }}</h3>
        <div class="time">{{ e.published }}</div>
        <p class="summary">{{ e.summary }}</p>
        <a href="{{ e.link }}" target="_blank" rel="noopener">阅读原文</a>
      </article>
      {% endfor %}
    </section>
    {% endfor %}
  </main>
</body>
</html>
