version: '3.8'

services:
  rss-web:
    build: .
    container_name: stanley-rss-web
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - IMA_OPENAPI_CLIENTID=${IMA_OPENAPI_CLIENTID}
      - IMA_OPENAPI_APIKEY=${IMA_OPENAPI_APIKEY}
      - IMA_KNOWLEDGE_BASE_ID=${IMA_KNOWLEDGE_BASE_ID}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./rss_sources.json:/app/rss_sources.json
